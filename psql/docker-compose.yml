services:
    psql:
        image: pgvector/pgvector:pg17
        container_name: psql_db
        ports:
            - "5432:5432"
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - pgdata:/var/lib/postgresql/data
volumes:
    pgdata:
